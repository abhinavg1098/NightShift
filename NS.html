<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Night Shift OS</title>
<meta name="theme-color" content="#101623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NightShift">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23101623'/><text y='68' x='50' text-anchor='middle' font-size='52'>🌙</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap');
  :root{
    --bg:#101623; --panel:#182136; --line:#2b3a5c; --text:#e8ecf5; --dim:#8b97b3;
    --amber:#f5b942; --amber-deep:#c98a1b; --green:#5fd39a; --red:#e8705f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Barlow',system-ui,sans-serif;
       max-width:520px; margin:0 auto; padding-bottom:calc(84px + env(safe-area-inset-bottom));}
  .disp{font-family:'Barlow Condensed','Barlow',sans-serif;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .eyebrow{color:var(--dim); font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;}
  button{font-family:inherit; cursor:pointer;}
  input{font-family:inherit;}
  header{padding:calc(20px + env(safe-area-inset-top)) 18px 10px; display:flex; justify-content:space-between; align-items:baseline;}
  h1{font-size:26px; font-weight:700; letter-spacing:.5px; margin:0;}
  h1 span{color:var(--amber);}
  #clock{color:var(--dim); font-size:13px;}
  main{padding:6px 18px; display:flex; flex-direction:column; gap:14px;}
  nav{position:fixed; bottom:0; left:0; right:0; max-width:520px; margin:0 auto;
      background:rgba(16,22,35,.96); border-top:1px solid var(--line); display:flex;
      backdrop-filter:blur(8px); padding-bottom:env(safe-area-inset-bottom);}
  nav button{flex:1; background:none; border:none; padding:12px 0 14px; color:var(--dim);}
  nav button.on{color:var(--amber);}
  nav .i{font-size:16px;} nav .l{font-size:11px; font-weight:600; letter-spacing:.5px;}
  .task{display:flex; align-items:center; gap:12px; width:100%; background:none; border:none;
        padding:9px 2px; color:var(--text); font-size:15px; text-align:left; border-bottom:1px solid var(--line);}
  .task.done{color:var(--dim); text-decoration:line-through;}
  .box{width:22px; height:22px; border-radius:7px; flex-shrink:0; border:2px solid var(--line);
       display:flex; align-items:center; justify-content:center; color:var(--bg); font-size:14px; font-weight:700;}
  .task.done .box{background:var(--green); border-color:var(--green);}
  .tl-row{display:flex; gap:14px;}
  .rail{display:flex; flex-direction:column; align-items:center; width:14px;}
  .dot{width:8px; height:8px; border-radius:99px; background:var(--line); margin-top:6px; flex-shrink:0;}
  .dot.on{width:12px; height:12px; background:var(--amber); box-shadow:0 0 10px var(--amber);}
  .rail .bar{width:2px; flex:1; background:var(--line);}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<header>
  <h1 class="disp">NIGHT SHIFT <span>OS</span></h1>
  <div id="clock"></div>
</header>
<main id="main"></main>
<nav id="nav"></nav>

<script>
// ---------- data ----------
const BLOCKS_WEEKDAY = [
  {s:510,e:540,t:"Home & wind down",d:"Small protein snack if hungry. No big meal. Screens off.",icon:"🏠"},
  {s:540,e:960,t:"Sleep",d:"7 hours. Blackout curtains, phone on DND. Protect this like a shift.",icon:"😴"},
  {s:960,e:1020,t:"Wake + Meal 1",d:"3 eggs + toast, or Greek yogurt + banana. Hydrate.",icon:"🍳"},
  {s:1020,e:1095,t:"Gym",d:"See today's session in the Gym tab. Bike there if you have one.",icon:"🏋️"},
  {s:1095,e:1155,t:"Shower + Meal 2",d:"Biggest meal: chicken breast + rice + veg.",icon:"🍗"},
  {s:1155,e:1200,t:"Pack shift meal",d:"Chicken + rice container, shaker, water bottle.",icon:"🥡"},
  {s:1200,e:1260,t:"Bus at 8:20",d:"Leave by 8:10. Bag: food, laptop, charger.",icon:"🚌"},
  {s:1260,e:1440,t:"Shift — busy hours",d:"Check-ins. Study in the gaps. Walk the property once an hour.",icon:"🛎️"},
  {s:0,e:60,t:"Meal 3 (packed)",d:"Chicken + rice, or shake + fruit. Nothing bought at work.",icon:"🌙"},
  {s:60,e:180,t:"Job applications",d:"2–3 quality apps. Tailor resume, follow up with recruiters.",icon:"💼"},
  {s:180,e:270,t:"Study / interview prep",d:"Playwright, Azure DevOps YAML. Caffeine cutoff was 2am.",icon:"📚"},
  {s:270,e:420,t:"Chill time",d:"Games, YouTube, whatever. Guilt-free — you earned it. Keep the hourly walk.",icon:"🎮"},
  {s:420,e:510,t:"Commute home",d:"Head home, no food stops. Bed by 9.",icon:"🚏"},
];
const BLOCKS_GRIND = [
  {s:420,e:480,t:"Motel → liquor store",d:"Coffee + a protein snack on the way. No breakfast stop.",icon:"🚏"},
  {s:480,e:780,t:"Liquor store shift",d:"Slow moments: save job postings on your phone for tonight's 1am block. Don't apply now — just collect.",icon:"🏪"},
  {s:780,e:840,t:"Commute home",d:"Straight home. You've been up ~22 hours — don't decide anything important.",icon:"🚌"},
  {s:840,e:870,t:"Quick meal",d:"Pre-cooked chicken + rice from Thursday's batch. Nothing heavy, then bed.",icon:"🍗"},
  {s:870,e:1185,t:"Sleep",d:"2:30–7:45pm. Only ~5.5h available — every minute counts. Phone off.",icon:"😴"},
  {s:1185,e:1220,t:"Wake, eat, grab bag",d:"Quick meal + grab the pre-packed shift food. No cooking tonight.",icon:"⚡"},
  {s:1220,e:1260,t:"Bus at 8:20",d:"Everything was packed Thursday. Just go.",icon:"🚌"},
  {s:1260,e:1440,t:"Shift — busy hours",d:"Check-ins. Keep it light tonight — you're running on short sleep.",icon:"🛎️"},
  {s:0,e:60,t:"Meal 3 (packed)",d:"Chicken + rice, or shake + fruit.",icon:"🌙"},
  {s:60,e:180,t:"Light apps OR chill",d:"Apply to the postings you saved this morning — or skip it if you're wrecked. Your call tonight.",icon:"💼"},
  {s:180,e:420,t:"Chill / wind down",d:"No heavy studying on double-shift nights. Games, shows, easy reading.",icon:"🎮"},
];
const isGrind = d => d===5||d===6||d===0;
const GYM = {
  1:{name:"Lift — Upper",detail:"Bench press · Rows · Overhead press · Pull-ups",kind:"lift"},
  2:{name:"Lift — Lower",detail:"Squats · Romanian deadlifts · Lunges · Calves",kind:"lift"},
  3:{name:"Incline sprints",detail:"12% incline · 8–10 × 25 sec · 90 sec rest",kind:"cardio"},
  4:{name:"Lift — Full body + big batch cook",detail:"Deadlift · Incline press · Rows · Abs. Then cook enough food for Fri–Sun.",kind:"lift"},
  5:{name:"Double-shift day — no gym",detail:"Motel + liquor store. Sleep is your training today.",kind:"rest"},
  6:{name:"Double-shift day — no gym",detail:"Hourly walks at both jobs count. Nothing else.",kind:"rest"},
  0:{name:"Double-shift day — no gym",detail:"Order groceries for delivery tonight if running low.",kind:"rest"},
};
const TASKS = [
  {id:"m1",label:"Meal 1 after waking"},
  {id:"gym",label:"Gym / cardio session"},
  {id:"m2",label:"Meal 2 before shift"},
  {id:"pack",label:"Packed shift meal"},
  {id:"m3",label:"Ate packed meal (not bought)"},
  {id:"apps",label:"2+ job applications"},
  {id:"drink",label:"No sugary drinks"},
  {id:"sleep",label:"Slept 7 hours"},
];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ---------- state ----------
let tab = "now";
const todayKey = () => new Date().toISOString().slice(0,10);
const load = (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e){ return fb; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
let checks = load("nsos-checks-"+todayKey(), {});
let weights = load("nsos-weights", []);

// ---------- helpers ----------
const fmt = m => { let h=Math.floor(m/60), mm=m%60; const ap=h>=12?"pm":"am"; h=h%12||12; return h+":"+String(mm).padStart(2,"0")+ap; };
const esc = s => s.replace(/</g,"&lt;");
const nowMins = () => { const n=new Date(); return n.getHours()*60+n.getMinutes(); };
const blocks = () => isGrind(new Date().getDay()) ? BLOCKS_GRIND : BLOCKS_WEEKDAY;

// ---------- render ----------
function render(){
  const n = new Date(), m = nowMins(), B = blocks(), grind = isGrind(n.getDay());
  document.getElementById("clock").textContent = DAYS[n.getDay()]+" · "+fmt(m);
  const ci = B.findIndex(b => m>=b.s && m<b.e);
  const cur = B[ci] || B[0];
  const next = B.map(b=>({...b,delta:(b.s-m+1440)%1440})).filter(b=>b.delta>0).sort((a,b)=>a.delta-b.delta)[0];
  const g = GYM[n.getDay()];
  const done = TASKS.filter(t=>checks[t.id]).length;
  let html = "";

  if(tab==="now"){
    html += `<div class="card" style="border-color:var(--amber-deep);background:linear-gradient(180deg,#1e2338,#182136)">
      <div class="eyebrow" style="color:var(--amber)">Right now · ${fmt(cur.s)}–${fmt(cur.e)}</div>
      <div class="disp" style="font-size:30px;font-weight:700;margin:6px 0 4px">${cur.icon} ${cur.t}</div>
      <div style="color:var(--dim);font-size:14px;line-height:1.5">${cur.d}</div>
      ${next?`<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-size:13px;color:var(--dim)">Next: <span style="color:var(--text)">${next.t}</span> at ${fmt(next.s)}</div>`:""}
    </div>
    <div class="card">
      <div class="eyebrow">${grind?"Training today":"Today at the gym — 5:00pm"}</div>
      <div class="disp" style="font-size:22px;font-weight:700;margin:4px 0 2px;${g.kind==="rest"?"color:var(--dim)":""}">${g.name}</div>
      <div style="color:var(--dim);font-size:14px">${g.detail}</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div class="eyebrow">Today's checklist</div>
        <div style="font-size:13px;font-weight:600;color:${done===TASKS.length?"var(--green)":"var(--dim)"}">${done}/${TASKS.length}</div>
      </div>
      ${TASKS.map(t=>`<button class="task ${checks[t.id]?"done":""}" onclick="toggleTask('${t.id}')">
        <span class="box">${checks[t.id]?"✓":""}</span>${t.label}</button>`).join("")}
      <div style="font-size:12px;color:var(--dim);margin-top:10px">Resets each day. 6 good days out of 7 wins the week.</div>
    </div>`;
  }

  if(tab==="day"){
    html += `<div class="card">
      <div class="eyebrow" style="color:${grind?"var(--red)":"var(--green)"};margin-bottom:12px">
        ${grind?"Double-shift day · motel + liquor store":"Weekday · motel only"}</div>
      ${B.map((b,i)=>`<div class="tl-row">
        <div class="rail"><div class="dot ${i===ci?"on":""}"></div>${i<B.length-1?'<div class="bar"></div>':""}</div>
        <div style="padding-bottom:18px;flex:1">
          <div style="font-size:12px;font-weight:600;color:${i===ci?"var(--amber)":"var(--dim)"}">${fmt(b.s)} – ${fmt(b.e)}</div>
          <div class="disp" style="font-size:18px;font-weight:600;color:${i===ci?"var(--text)":"#c6cede"}">${b.icon} ${b.t}</div>
          <div style="font-size:13px;color:var(--dim);line-height:1.45">${b.d}</div>
        </div></div>`).join("")}
    </div>`;
  }

  if(tab==="gym"){
    html += [1,2,3,4,5,6,0].map(d=>{
      const gg=GYM[d], isT=d===n.getDay();
      const col = gg.kind==="lift"?"var(--amber)":gg.kind==="cardio"?"var(--green)":"var(--dim)";
      return `<div class="card" style="padding:14px;${isT?"border-color:var(--amber-deep)":""}">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="disp" style="font-size:18px;font-weight:700">${DAYS[d]} ${isT?'<span style="color:var(--amber);font-size:12px">· TODAY</span>':""}</div>
          <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:${col};text-transform:uppercase">${gg.kind}</div>
        </div>
        <div style="font-size:15px;font-weight:600;margin-top:2px">${gg.name}</div>
        <div style="font-size:13px;color:var(--dim)">${gg.detail}</div>
      </div>`;
    }).join("") + `<div style="font-size:12px;color:var(--dim);padding:4px 4px 0">All training lives Mon–Thu. Thursday's batch cook must cover Fri–Sun. If weekday sleep drops under 6h, skip Wednesday sprints — never the sleep.</div>`;
  }

  if(tab==="weight"){
    let stats = null;
    if(weights.length>=2){
      const avg=a=>a.reduce((s,w)=>s+w.kg,0)/a.length;
      const l7=weights.slice(-7), p7=weights.slice(-14,-7);
      stats={cur:avg(l7), delta:p7.length?avg(l7)-avg(p7):null};
    }
    const dcol = stats&&stats.delta!=null ? (stats.delta<=-0.3&&stats.delta>=-0.8?"var(--green)":"var(--amber)") : "var(--text)";
    html += `<div class="card">
      <div class="eyebrow" style="margin-bottom:8px">Log today's weight (after waking)</div>
      <div style="display:flex;gap:8px">
        <input id="wIn" inputmode="decimal" placeholder="e.g. 90.4"
          style="flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:12px 14px;font-size:16px;outline:none">
        <button onclick="addWeight()" style="background:var(--amber);color:#1a1408;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:15px">Save</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;gap:20px">
        <div><div style="font-size:12px;color:var(--dim)">7-day average</div>
          <div class="disp" style="font-size:28px;font-weight:700">${stats?stats.cur.toFixed(1):"—"} <span style="font-size:14px;color:var(--dim)">kg</span></div></div>
        <div><div style="font-size:12px;color:var(--dim)">vs last week</div>
          <div class="disp" style="font-size:28px;font-weight:700;color:${dcol}">${stats&&stats.delta!=null?(stats.delta>0?"+":"")+stats.delta.toFixed(1):"—"}<span style="font-size:14px;color:var(--dim)"> kg</span></div></div>
      </div>
      <div style="font-size:12px;color:var(--dim);margin-top:8px">Target: −0.4 to −0.5 kg/week. Flat for 2 weeks → halve the rice. Dropping over 1kg/week → add some back.</div>
    </div>`;
    if(weights.length){
      html += `<div class="card"><div class="eyebrow" style="margin-bottom:6px">History</div>
        ${[...weights].reverse().slice(0,14).map(w=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px">
          <span style="color:var(--dim)">${w.d}</span><span style="font-weight:600">${w.kg.toFixed(1)} kg</span></div>`).join("")}
      </div>`;
    } else {
      html += `<div style="text-align:center;color:var(--dim);font-size:13px;padding:8px">No entries yet. Weigh in after waking, before eating — same conditions every time.</div>`;
    }
  }

  document.getElementById("main").innerHTML = html;
  document.getElementById("nav").innerHTML = [
    {id:"now",l:"Now",i:"◉"},{id:"day",l:"Timeline",i:"☾"},{id:"gym",l:"Gym",i:"▲"},{id:"weight",l:"Weight",i:"▽"}
  ].map(t=>`<button class="${tab===t.id?"on":""}" onclick="setTab('${t.id}')"><div class="i">${t.i}</div><div class="l">${t.l}</div></button>`).join("");
}

// ---------- actions ----------
function setTab(t){ tab=t; render(); }
function toggleTask(id){
  const k = "nsos-checks-"+todayKey();
  checks = load(k, {});               // reload in case day rolled over
  checks[id] = !checks[id];
  save(k, checks);
  render();
}
function addWeight(){
  const v = parseFloat(document.getElementById("wIn").value);
  if(!v || v<30 || v>250) return;
  weights = [...weights.filter(w=>w.d!==todayKey()), {d:todayKey(), kg:v}].sort((a,b)=>a.d.localeCompare(b.d));
  save("nsos-weights", weights);
  render();
}

// day rollover: refresh checks if date changed
let lastDay = todayKey();
setInterval(()=>{
  if(todayKey()!==lastDay){ lastDay=todayKey(); checks=load("nsos-checks-"+lastDay,{}); }
  render();
}, 30000);

render();
</script>
</body>
</html>
